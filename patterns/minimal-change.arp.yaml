type: atomic_reasoning_pattern
schema_version: "1.0"
id: guild://patterns/minimal-change
name: Minimal Change Principle
cognitive_action: |
  When fixing a root cause, make the smallest possible change that addresses the
  specific hypothesis. Do not refactor adjacent code. Do not "improve" unrelated areas.
  Do not change code style, formatting, or variable names unless they are the root cause.
  After the fix, verify the original failure is resolved before making any additional changes.
entry_condition: |
  A root cause has been identified and a fix is being planned.
exit_condition: |
  The minimal fix is applied. The original failure is confirmed resolved.
  No additional changes were made beyond what was necessary.
anti_patterns:
  - name: refactor_adjacent
    description: "Refactoring unrelated code in the same change set"
    severity: high
  - name: style_changes
    description: "Changing formatting, variable names, or style in a fix PR"
    severity: medium
  - name: over_generalize
    description: "Making a fix more general than needed to handle the specific case"
    severity: medium
  - name: shotgun_debugging
    description: "Making multiple unrelated changes hoping one fixes the problem"
    severity: high
failure_cases:
  - name: regression_risk
    severity: low
    probability: low
    description: "Minimal changes can miss related issues — a slightly broader change might prevent future failures"
