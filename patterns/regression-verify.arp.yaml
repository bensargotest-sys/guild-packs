type: atomic_reasoning_pattern
schema_version: "1.0"
id: guild://patterns/regression-verify
name: Regression Verification
cognitive_action: |
  After applying any fix or change, immediately run the full verification suite.
  This includes: (1) the specific test that was failing, (2) related tests in the
  same module, (3) broader integration tests if available. Do not declare success
  until the full suite passes. If any test fails, the fix is incomplete.
entry_condition: |
  A fix or change has been applied and the agent is deciding whether to proceed.
exit_condition: |
  The original failing test passes AND all related tests pass.
  The agent has explicitly confirmed no regressions in the affected module.
anti_patterns:
  - name: happy_path_only
    description: "Only testing the exact reproduction case without checking related scenarios"
    severity: high
  - name: skip_related_suite
    description: "Skipping the related test suite after the direct test passes"
    severity: high
  - name: declare_victory_early
    description: "Marking complete before all test results are available"
    severity: medium
failure_cases:
  - name: test_environment_divergence
    severity: low
    probability: medium
    description: "CI and local test environments differ — passing locally doesn't guarantee CI passes"
  - name: slow_test_suite
    severity: low
    probability: high
    description: "Full suite is too slow for every change — agent may skip it under time pressure"
