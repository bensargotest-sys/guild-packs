type: atomic_reasoning_pattern
schema_version: "1.0"
id: guild://patterns/single-hypothesis-test
name: Single Hypothesis Testing
cognitive_action: |
  When confronted with a failure, form exactly ONE hypothesis about the root cause.
  Make the smallest possible change to test it. Run the test. If confirmed, proceed.
  If rejected, form a NEW hypothesis — do not stack fixes on top of failed attempts.
  State your hypothesis before making any change: "I believe [X] is the cause because [evidence]."
entry_condition: |
  A failure has been observed (test fails, error occurs, output is wrong).
  The root cause is unknown or uncertain.
exit_condition: |
  Either: (a) a hypothesis is confirmed by a passing test/assertion, OR
  (b) three hypotheses have been rejected and the agent has explicitly escalated or changed approach.
anti_patterns:
  - name: stacked_fixes
    description: "Making multiple changes before testing any of them"
    severity: high
  - name: hypothesis_drift
    description: "Abandoning a hypothesis without formally rejecting it and moving to a new one"
    severity: medium
  - name: premature_closure
    description: "Declaring a fix successful without running verification"
    severity: high
failure_cases:
  - name: multi_cause
    severity: medium
    probability: medium
    description: "When failure has more than one independent cause — single hypothesis fails even when each individual cause is fixed"
  - name: heisenbug
    severity: high
    probability: low
    description: "When debugging changes the timing or environment, masking the original failure"
