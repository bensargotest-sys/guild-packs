type: atomic_reasoning_pattern
schema_version: "1.0"
id: guild://patterns/bisection-isolate
name: Bisection Isolation
cognitive_action: |
  When searching for a cause within a large search space (codebase, commits, config options),
  use binary search. Test the midpoint. Eliminate half. Repeat. Never test adjacent
  possibilities sequentially — bisection reduces a 1000-item search to 10 tests.
entry_condition: |
  The cause lies within a large, ordered search space (git history, file tree, config range,
  parameter space) and can be classified as before/after or present/absent.
exit_condition: |
  The cause is isolated to a specific, minimal region (single commit, single file, single config value).
anti_patterns:
  - name: linear_scan
    description: "Testing possibilities one by one instead of bisecting"
    severity: high
  - name: skip_half
    description: "Eliminating more than half when uncertain"
    severity: medium
  - name: wrong_dimension
    description: "Applying bisection to an unordered or multi-dimensional space"
    severity: high
failure_cases:
  - name: non_monotonic
    severity: high
    probability: medium
    description: "When the property doesn't vary monotonically — bisection assumptions break"
  - name: high_dimension
    severity: medium
    probability: medium
    description: "When cause requires multi-dimensional search (not 1D) — bisection insufficient"
