type: atomic_reasoning_pattern
schema_version: "1.0"
id: guild://patterns/reproduce-before-fix
name: Reproduce Before Fix
cognitive_action: |
  Never attempt to fix a bug you cannot reproduce. First, establish a consistent
  reproduction path. Run the failing case at least 3 times to confirm consistency.
  Capture exact error output. Only after reproduction is confirmed, proceed to analysis.
entry_condition: |
  A bug, error, or failure has been reported or observed.
  The agent does not yet have a consistent reproduction case.
exit_condition: |
  The agent can reproduce the failure consistently (3+ consecutive reproductions)
  with documented exact steps and error output.
anti_patterns:
  - name: guess_before_reproduce
    description: "Proposing a fix before establishing consistent reproduction"
    severity: high
  - name: partial_reproduction
    description: "Reproducing once and declaring the bug understood without confirming consistency"
    severity: high
  - name: assume_most_recent_change
    description: "Assuming the bug is in the most recently changed code without evidence"
    severity: medium
failure_cases:
  - name: environment_specific
    severity: medium
    probability: medium
    description: "Bug only occurs in specific environment or configuration — reproduction may not transfer"
  - name: heisenbug
    severity: high
    probability: low
    description: "Adding debug instrumentation changes timing and masks the original failure"
