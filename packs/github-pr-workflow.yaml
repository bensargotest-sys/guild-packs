version: 1.0.0
id: guild://hermes/github-pr-workflow
problem_class: Full pull request lifecycle — create branches, commit changes, open
  PRs, monitor CI status, auto-fix failures, and merge. Works with gh CLI or falls
  back to git + GitHub REST API via curl.
mental_model: ''
required_inputs:
- 'task_description: what you need to accomplish'
phases:
- name: 1__branch_creation
  description: 'This part is pure `git` — identical either way:


    ```bash

    # Make sure you''re up to date

    git fetch origin

    git checkout main && git pull origin main


    # Create and switch to a new branch

    git checkout -b feat/add-user-authentication

    ```


    Branch naming conventions:

    - `feat/description` — new features

    - `fix/description` — bug fixes

    - `refactor/description` — code restructuring

    - `docs/description` — documentation

    - `ci/description` — CI/CD changes'
  checkpoint: Verify 1. branch creation is complete and correct.
  anti_patterns: []
  prompts: []
- name: 2__making_commits
  description: 'Use the agent''s file tools (`write_file`, `patch`) to make changes,
    then commit:


    ```bash

    # Stage specific files

    git add src/auth.py src/models/user.py tests/test_auth.py


    # Commit with a conventional commit message

    git commit -m "feat: add JWT-based user authentication


    - Add login/register endpoints

    - Add User model with credential hashing

    - Add auth middleware for protected routes

    - Add unit tests for auth flow"

    ```


    Commit message format (Conventional Commits):

    ```

    type(scope): short description


    Longer explanation if needed. Wrap at 72 characters.

    ```


    Types: `feat`, `fix`, `refactor`, `docs`, `test`, `ci`, `chore`, `perf`'
  checkpoint: Verify 2. making commits is complete and correct.
  anti_patterns: []
  prompts: []
- name: 3__pushing_and_creating_a_pr
  description: "### Push the Branch (same either way)\n\n```bash\ngit push -u origin\
    \ HEAD\n```\n\n### Create the PR\n\n**With gh:**\n\n```bash\ngh pr create \\\n\
    \  --title \"feat: add JWT-based user authentication\" \\\n  --body \"## Summary\n\
    - Adds login and register API endpoints\n- JWT auth credential generation and validation"
  checkpoint: Verify 3. pushing and creating a pr is complete and correct.
  anti_patterns: []
  prompts: []
- name: test_plan
  description: "- [ ] Unit tests pass\n\nCloses #42\"\n```\n\nOptions: `--draft`,\
    \ `--reviewer user1,user2`, `--label \"enhancement\"`, `--base develop`\n\n**With\
    \ git + curl:**\n\n```bash\nBRANCH=$(git branch --show-current)\n\ncurl -s -X\
    \ POST \\\n  -H \"Authorization: auth credential $GITHUB_TOKEN\" \\\n  -H \"Accept: application/vnd.github.v3+json\"\
    \ \\\n  https://api.github.com/repos/$OWNER/$REPO/pulls \\\n  -d \"{\n    \\\"\
    title\\\": \\\"feat: add JWT-based user authentication\\\",\n    \\\"body\\\"\
    : \\\"## Summary\\nAdds login and register API endpoints.\\n\\nCloses #42\\\"\
    ,\n    \\\"head\\\": \\\"$BRANCH\\\",\n    \\\"base\\\": \\\"main\\\"\n  }\"\n\
    ```\n\nThe response JSON includes the PR `number` — save it for later commands.\n\
    \nTo create as a draft, add `\"draft\": true` to the JSON body."
  checkpoint: Verify test plan is complete and correct.
  anti_patterns: []
  prompts: []
- name: 4__monitoring_ci_status
  description: "### Check CI Status\n\n**With gh:**\n\n```bash\n# One-shot check\n\
    gh pr checks\n\n# Watch until all checks finish (polls every 10s)\ngh pr checks\
    \ --watch\n```\n\n**With git + curl:**\n\n```bash\n# Get the latest commit SHA\
    \ on the current branch\nSHA=$(git rev-parse HEAD)\n\n# Query the combined status\n\
    curl -s \\\n  -H \"Authorization: auth credential $GITHUB_TOKEN\" \\\n  https://api.github.com/repos/$OWNER/$REPO/commits/$SHA/status\
    \ \\\n  | python3 -c \"\nimport sys, json\ndata = json.load(sys.stdin)\nprint(f\\\
    \"Overall: {data['state']}\\\")\nfor s in data.get('statuses', []):\n    print(f\\\
    \"  {s['context']}: {s['state']} - {s.get('description', '')}\\\")\"\n\n# Also\
    \ check GitHub Actions check runs (separate endpoint)\ncurl -s \\\n  -H \"Authorization:\
    \ auth credential $GITHUB_TOKEN\" \\\n  https://api.github.com/repos/$OWNER/$REPO/commits/$SHA/check-runs\
    \ \\\n  | python3 -c \"\nimport sys, json\ndata = json.load(sys.stdin)\nfor cr\
    \ in data.get('check_runs', []):\n    print(f\\\"  {cr['name']}: {cr['status']}\
    \ / {cr['conclusion'] or 'pending'}\\\")\"\n```\n\n### Poll Until Complete (git\
    \ + curl)\n\n```bash\n# Simple polling loop — check every 30 seconds, up to 10\
    \ minutes\nSHA=$(git rev-parse HEAD)\nfor i in $(seq 1 20); do\n  STATUS=$(curl\
    \ -s \\\n    -H \"Authorization: auth credential $GITHUB_TOKEN\" \\\n    https://api.github.com/repos/$OWNER/$REPO/commits/$SHA/status\
    \ \\\n    | python3 -c \"import sys,json; print(json.load(sys.stdin)['state'])\"\
    )\n  echo \"Check $i: $STATUS\"\n  if [ \"$STATUS\" = \"success\" ] || [ \"$STATUS\"\
    \ = \"failure\" ] || [ \"$STATUS\" = \"error\" ]; then\n    break\n  fi\n  sleep\
    \ 30\ndone\n```"
  checkpoint: Verify 4. monitoring ci status is complete and correct.
  anti_patterns: []
  prompts: []
- name: 5__auto_fixing_ci_failures
  description: "When CI fails, diagnose and fix. This loop works with either auth\
    \ method.\n\n### Step 1: Get Failure Details\n\n**With gh:**\n\n```bash\n# List\
    \ recent workflow runs on this branch\ngh run list --branch $(git branch --show-current)\
    \ --limit 5\n\n# View failed logs\ngh run view <RUN_ID> --log-failed\n```\n\n\
    **With git + curl:**\n\n```bash\nBRANCH=$(git branch --show-current)\n\n# List\
    \ workflow runs on this branch\ncurl -s \\\n  -H \"Authorization: auth credential $GITHUB_TOKEN\"\
    \ \\\n  \"https://api.github.com/repos/$OWNER/$REPO/actions/runs?branch=$BRANCH&per_page=5\"\
    \ \\\n  | python3 -c \"\nimport sys, json\nruns = json.load(sys.stdin)['workflow_runs']\n\
    for r in runs:\n    print(f\\\"Run {r['id']}: {r['name']} - {r['conclusion'] or\
    \ r['status']}\\\")\"\n\n# Get failed job logs (download as zip, extract, read)\n\
    RUN_ID=<run_id>\ncurl -s -L \\\n  -H \"Authorization: auth credential $GITHUB_TOKEN\" \\\
    \n  https://api.github.com/repos/$OWNER/$REPO/actions/runs/$RUN_ID/logs \\\n \
    \ -o /tmp/ci-logs.zip\ncd /tmp && unzip -o ci-logs.zip -d ci-logs && cat ci-logs/*.txt\n\
    ```\n\n### Step 2: Fix and Push\n\nAfter identifying the issue, use file tools\
    \ (`patch`, `write_file`) to fix it:\n\n```bash\ngit add <fixed_files>\ngit commit\
    \ -m \"fix: resolve CI failure in <check_name>\"\ngit push\n```\n\n### Step 3:\
    \ Verify\n\nRe-check CI status using the commands from Section 4 above.\n\n###\
    \ Auto-Fix Loop Pattern\n\nWhen asked to auto-fix CI, follow this loop:\n\n1.\
    \ Check CI status → identify failures\n2. Read failure logs → understand the error\n\
    3. Use `read_file` + `patch`/`write_file` → fix the code\n4. `git add . && git\
    \ commit -m \"fix: ...\" && git push`\n5. Wait for CI → re-check status\n6. Repeat\
    \ if still failing (up to 3 attempts, then ask the user)"
  checkpoint: Verify 5. auto-fixing ci failures is complete and correct.
  anti_patterns: []
  prompts: []
