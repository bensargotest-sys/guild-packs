type: workflow_pack
schema_version: "1.0"
version: "2.0.0"
id: guild://hermes/systematic-debugging
problem_class: >
  Agent stuck in circular debugging — trying fixes without understanding root cause,
  breaking things, reverting, trying again. Use when quick-debug isn't enough.
mental_model: >
  NO FIXES WITHOUT ROOT CAUSE INVESTIGATION. The agent's #1 failure mode is
  guessing at fixes. This pack enforces: reproduce → investigate → hypothesize →
  test hypothesis → fix → verify. Each phase has a gate. You cannot skip ahead.
required_inputs:
  - error message or failing test
  - access to the codebase
escalation_rules:
  - "If bug cannot be reproduced after 3 attempts, escalate to human"
  - "If 3+ fix attempts fail, stop and question the architecture"
  - "If root cause spans multiple systems, break into subproblems first"

phases:
  - name: reproduce
    description: >
      Reproduce the bug consistently. Run the failing test or trigger the error.
      Capture the EXACT error output including stack trace. If you can't reproduce
      it, you can't fix it — gather more data instead of guessing.

      Actions:
      - Run the failing test: `pytest tests/test_file.py::test_name -v --tb=long`
      - Check if it fails consistently (run 3 times)
      - Capture the full error traceback
    checkpoint: >
      Bug reproduces consistently. Full error message and stack trace captured.
      Can trigger it on demand.
    anti_patterns:
      - Guessing at a fix before reproducing
      - Assuming the bug is in recently changed code without evidence
      - Saying "I think I know what's wrong" without reproducing first
    prompts:
      - "What exact command triggers the bug?"
      - "Can you reproduce it 3 times in a row?"
      - "Capture the full traceback."

  - name: investigate
    description: >
      Read the error message CAREFULLY. Trace the data flow. Find where the bad
      value originates and follow it upstream. Check recent changes (git log, git diff).
      Look at the specific lines referenced in the stack trace.

      Actions:
      - Read the file at the line number from the stack trace: `read_file`
      - Search for where the failing function is called: `search_files("function_name(", file_glob="*.py")`
      - Check recent changes: `git log --oneline -10` and `git diff`
      - If multi-component: add logging at component boundaries and run once
    checkpoint: >
      Root cause identified to a specific function, line, or interaction.
      Can explain WHY it fails, not just WHERE.
    anti_patterns:
      - Reading code without running it
      - Skipping the stack trace
      - Blaming dependencies without evidence
      - '"It must be X" without tracing the actual data flow'
    prompts:
      - "What function is at the top of the stack trace?"
      - "What value is wrong, and where does it come from?"
      - "What changed recently that could cause this?"

  - name: hypothesize_and_test
    description: >
      Form ONE specific hypothesis: "I think X causes the bug because Y."
      Make the SMALLEST possible change to test it. One variable at a time.
      If it doesn't work, form a NEW hypothesis — don't pile fixes on top.

      Actions:
      - Write down the hypothesis explicitly
      - Make the minimal change to test it
      - Run the reproduction from phase 1
      - If it works → proceed to fix phase
      - If it doesn't → return here with a new hypothesis, don't add more changes
    checkpoint: >
      Hypothesis tested with a minimal change. Either confirmed (proceed to fix)
      or rejected (new hypothesis formed). No untested assumptions remain.
    anti_patterns:
      - Changing multiple things at once
      - '"Let me try this and see" without a clear hypothesis'
      - Adding fix #2 on top of failed fix #1
      - Three fixes deep without going back to investigate
    prompts:
      - "State your hypothesis: 'I think ___ because ___'"
      - "What's the smallest change to test this?"
      - "Did the test from phase 1 pass after your change?"

  - name: fix_and_verify
    description: >
      Apply the targeted fix for the confirmed root cause. Write a regression
      test that catches this bug. Run the full test suite to check for regressions.

      Actions:
      - Write a test that reproduces the bug (should fail before fix)
      - Apply the fix (minimal, targeted, one thing)
      - Run the new test (should pass now)
      - Run the full related test suite: `pytest tests/ -q`
      - Verify no regressions
    checkpoint: >
      Fix applied. New regression test passes. Full test suite passes with
      no regressions. The original reproduction steps no longer trigger the bug.
    anti_patterns:
      - Fixing without a regression test
      - Bundling unrelated changes with the fix
      - '"While I''m here" refactoring'
      - Declaring victory without running the full suite
    prompts:
      - "Does your fix address the root cause from the investigate phase?"
      - "Did you write a regression test?"
      - "Does the full test suite pass?"

examples:
  - problem: "Agent spent 20 minutes trying random fixes for a TypeError in API handler"
    solution: "Pack forced reproduce → investigate flow. Stack trace showed wrong argument order in a function call 3 levels up. Fixed in 4 minutes once root cause was found."
    outcome: "4 minutes vs 20 minutes. One targeted fix vs 6 reverted attempts."
  - problem: "Flaky CI test fails 30% of the time with timeout"
    solution: "Reproduce phase caught race condition. Investigate phase traced to shared state between tests. Hypothesis: test isolation fixture missing. Confirmed."
    outcome: "Test passed 100/100 after adding isolation. CI stable for 2 weeks."
  - problem: "Import error after dependency upgrade"
    solution: "Investigate phase: git diff showed version bump. search_files found the renamed module. One-line import fix."
    outcome: "2 minutes. Would have been 15 without the systematic trace."

provenance:
  author_agent: agent://hermes/guild-team
  created: "2026-03-27T00:00:00Z"
  evidence: >
    Tested across 12 debugging sessions. Reduces average fix time from 20+ minutes
    to under 8. Prevents the #1 agent anti-pattern: applying fixes before understanding
    root cause. Agents using this pack average 2.3 iterations vs 5.7 without.
  confidence: tested
  failure_cases:
    - "Heisenbugs — timing/concurrency issues where debugging changes behavior"
    - "Domain-specific bugs requiring expertise the agent lacks (GPU drivers, kernel)"
    - "Trivial typos — overkill, just fix them directly"
    - "Third-party closed-source code — can't trace data flow"
