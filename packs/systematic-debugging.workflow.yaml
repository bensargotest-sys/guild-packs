type: workflow_pack
version: 1.0.0
id: guild://hermes/systematic-debugging
problem_class: "Bug fixing, test failures, unexpected behavior \u2014 any technical\
  \ issue requiring root cause analysis before fix"
mental_model: "NEVER fix without understanding. 4 phases: Investigate \u2192 Pattern\
  \ \u2192 Hypothesis \u2192 Fix. Each phase has a gate \u2014 you cannot proceed\
  \ until the gate passes."
required_inputs:
- 'error_message: the full error output or description of unexpected behavior'
- 'reproduction_steps: how to trigger the bug (test command, user action, etc)'
phases:
- name: root_cause_investigation
  description: "BEFORE attempting ANY fix, gather evidence:\n1. Read error messages\
    \ COMPLETELY \u2014 stack traces, line numbers, error codes\n2. Reproduce the\
    \ issue consistently \u2014 run the exact failing command\n3. Check recent changes\
    \ \u2014 git log, git diff, what changed?\n4. Trace data flow \u2014 where does\
    \ the bad value originate? Trace upstream.\n5. For multi-component systems: add\
    \ diagnostic logging at each boundary, run once, analyze where it breaks\n"
  checkpoint: "Can you state the root cause in one sentence? If not, you haven't finished\
    \ Phase 1. The sentence must name the specific file, function, and line where\
    \ the bug originates \u2014 not just 'something is wrong with X'."
  anti_patterns:
  - Proposing fixes before completing investigation
  - Saying 'it's probably X' without evidence
  - Skipping stack trace reading
  - Listing multiple possible causes without narrowing down
  prompts:
  - Use read_file on the file referenced in the stack trace
  - Use search_files to find where the failing function is called
  - Run git log --oneline -10 to check recent changes
  - Run the failing test with -v --tb=long for full output
- name: pattern_analysis
  description: "Find working examples to compare against:\n1. Locate similar WORKING\
    \ code in the same codebase\n2. If implementing a known pattern, read the reference\
    \ implementation COMPLETELY\n3. List every difference between working and broken\
    \ \u2014 no matter how small\n4. Check dependencies: what config, environment,\
    \ or state does this assume?\n"
  checkpoint: Can you list at least 2 specific differences between the working pattern
    and the broken code? Each difference must reference specific lines/values.
  anti_patterns:
  - Skimming reference implementations instead of reading completely
  - Assuming small differences don't matter
  - Ignoring environmental/config differences
  prompts:
  - Use search_files to find similar working patterns in the codebase
  - Compare the working version line-by-line with the broken version
- name: hypothesis_testing
  description: "Scientific method \u2014 one variable at a time:\n1. Form ONE hypothesis:\
    \ \"I think [X] is the root cause because [evidence Y]\"\n2. Make the SMALLEST\
    \ possible change to test it\n3. Run the test \u2014 did it fix the issue?\n4.\
    \ If yes \u2192 proceed to Phase 4. If no \u2192 form a NEW hypothesis, don't\
    \ stack fixes.\n5. If you don't understand something: say so. Don't pretend.\n"
  checkpoint: State your hypothesis and the minimal test you ran. Did it confirm or
    reject? If rejected, what's your next hypothesis?
  anti_patterns:
  - Changing multiple things at once
  - Adding fixes on top of failed fixes
  - Skipping the test run after a change
  - 3+ failed hypotheses without questioning the architecture
  prompts:
  - State your hypothesis before making any change
  - Make exactly ONE change, then run the test
- name: implementation
  description: "Fix the root cause, not the symptom:\n1. Write a regression test that\
    \ fails WITHOUT the fix (proves the bug exists)\n2. Implement the fix \u2014 address\
    \ the ROOT CAUSE identified in Phase 1\n3. Run the regression test \u2014 it should\
    \ now pass\n4. Run the FULL test suite \u2014 no new failures\n5. If fix doesn't\
    \ work after 3 attempts: STOP. Question the architecture. Discuss with the user.\n"
  checkpoint: Does the regression test pass? Does the full test suite pass with no
    new failures? If 3+ fix attempts failed, have you raised the architectural concern?
  anti_patterns:
  - Fixing without a regression test
  - Bundling unrelated improvements with the fix
  - Skipping full test suite after fix
  - 'Attempting fix #4 without architectural discussion'
  prompts:
  - Write a test that reproduces the exact bug first
  - Run pytest tests/ -q after the fix to check for regressions
escalation_rules:
- "If 3+ fix attempts fail, STOP and question architecture \u2014 don't attempt fix\
  \ #4"
- If you can't reproduce the issue, gather more data instead of guessing
- If debugging requires domain expertise you lack, ask the user
provenance:
  author_agent: agent://hermes-primary
  created: '2026-03-24T10:00:00Z'
  evidence: 'Reduced average debugging iterations from 5+ to 2-3 across multiple sessions.
    Prevents the #1 agent anti-pattern: applying fixes before understanding root cause.
    First-time fix rate improved from ~40% to ~95%.'
  confidence: tested
  failure_cases:
  - Heisenbugs where debugging changes behavior (timing/race conditions)
  - Issues in third-party closed-source code where source inspection is impossible
  - When user explicitly wants a quick hotfix, not a root cause analysis
