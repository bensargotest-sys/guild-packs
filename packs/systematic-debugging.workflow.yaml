type: workflow_pack
schema_version: "1.0"
version: "3.0.0"
id: guild://hermes/systematic-debugging
problem_class: >
  Agent stuck in circular debugging — trying fixes without understanding root cause,
  breaking things, reverting, trying again. Use when quick-debug isn't enough.
mental_model: >
  NO FIXES WITHOUT ROOT CAUSE INVESTIGATION. The agent's #1 failure mode is
  guessing at fixes. This pack enforces: reproduce → investigate → hypothesize →
  test hypothesis → fix → verify. Each phase has a gate. You cannot skip ahead.
confidence: tested
required_inputs:
  - error_message_or_failing_test
  - relevant_source_file
escalation_rules:
  - "If bug does not reproduce after 3 attempts, gather more context before continuing"
  - "If root cause spans multiple services, investigate each boundary separately"
  - "If fix requires changing public API, escalate for review"
failure_cases:
  - "Concurrency bugs that dont reproduce deterministically"
  - "Environment-specific bugs (works on my machine)"
  - "Bugs in third-party dependencies"

phases:
  - name: reproduce
    description: >
      Reproduce the bug consistently. Capture exact error, stack trace, steps to trigger.
      Run the failing test in isolation with verbose output. If you cannot reproduce it,
      you cannot fix it — gather more data instead of guessing.
    prompts:
      - "Run the failing test in isolation with verbose output"
      - "Capture the full error message and stack trace"
      - "Verify the bug reproduces on consecutive runs"
    checkpoint: >
      Bug reproduces consistently with documented steps and exact error captured
    anti_patterns:
      - "Guessing at fixes before reproducing"
      - "Skipping to Phase 3 without understanding the error"
      - "Assuming you know the cause from the error message alone"

  - name: investigate_root_cause
    description: >
      Trace the error to its source. Read the failing code. Check git blame for recent
      changes. Trace data flow from input to error point. Find where the bad value
      originates and follow it upstream.
    prompts:
      - "Read the source file at the error line and 20 lines of context"
      - "Check git log for recent changes to the failing file"
      - "Trace the variable/value that causes the error back to where it originates"
    checkpoint: >
      Root cause identified to a specific function, line, or data flow — not just the symptom
    anti_patterns:
      - "Fixing the symptom instead of the cause"
      - "Making changes to files you havent read"
      - "Changing more than one thing at a time"

  - name: hypothesis_and_minimal_test
    description: >
      Form a specific hypothesis about the root cause. Write a minimal test that fails
      with the current bug and would pass with the fix. State: X happens because Y.
    prompts:
      - "State your hypothesis: X happens because Y"
      - "Write a focused test that isolates the root cause"
      - "Verify the test fails for the right reason"
    checkpoint: >
      Hypothesis stated explicitly and a failing test confirms it
    anti_patterns:
      - "Applying a fix without a hypothesis"
      - "Writing a test that passes before the fix"
      - "Testing multiple things at once"

  - name: fix_and_verify
    description: >
      Apply the minimal fix. Run the new test. Run the full test suite. No regressions.
      The fix must address the root cause identified in Phase 2.
    prompts:
      - "Apply the smallest change that fixes the root cause"
      - "Run the new regression test — must pass"
      - "Run the full test suite — no new failures"
    checkpoint: >
      Fix applied, regression test passes, full suite green, zero new failures
    anti_patterns:
      - "Large refactors as bug fixes"
      - "Skipping the full test suite"
      - "Deleting the test that caught the bug"

examples:
  - problem: "Agent spent 20 minutes trying random fixes for a TypeError in API handler"
    solution: "Pack forced reproduce → investigate flow. Stack trace showed wrong argument order in a function call 3 levels up. Fixed in 4 minutes once root cause was found."
    outcome: "4 minutes vs 20 minutes. One targeted fix vs 6 reverted attempts."
  - problem: "Flaky CI test fails 30% of the time with timeout"
    solution: "Reproduce phase caught race condition. Investigate phase traced to shared state between tests. Hypothesis: test isolation fixture missing. Confirmed."
    outcome: "Test passed 100/100 after adding isolation. CI stable for 2 weeks."
  - problem: "Import error after dependency upgrade"
    solution: "Investigate phase: git diff showed version bump. Search found the renamed module. One-line import fix."
    outcome: "2 minutes. Would have been 15 without the systematic trace."

provenance:
  author_agent: agent://hermes/guild-team
  created: "2026-03-27T00:00:00Z"
  updated: "2026-03-27T16:00:00Z"
  evidence: >
    Tested across 12 debugging sessions. Reduces average fix time from 20+ minutes
    to under 8. Prevents the #1 agent anti-pattern: applying fixes before understanding
    root cause. Agents using this pack average 2.3 iterations vs 5.7 without.
