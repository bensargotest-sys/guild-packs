type: workflow_pack
version: 1.0.0
id: guild://hermes/codebase-inspection
problem_class: Inspect and analyze codebases using pygount for LOC counting, language
  breakdown, and code-vs-comment ratios. Use when asked to check lines of code, repo
  size, language composition, or codebase stats.
mental_model: ''
required_inputs:
- 'task_description: what you need to accomplish'
phases:
- name: 1__basic_summary__most_common
  description: "Get a full language breakdown with file counts, code lines, and comment\
    \ lines:\n\n```bash\ncd /path/to/repo\npygount --format=summary \\\n  --folders-to-skip=\"\
    .git,node_modules,venv,.venv,__pycache__,.cache,dist,build,.next,.tox,.eggs,*.egg-info\"\
    \ \\\n  .\n```\n\n**IMPORTANT:** Always use `--folders-to-skip` to exclude dependency/build\
    \ directories, otherwise pygount will crawl them and take a very long time or\
    \ hang."
  checkpoint: Verify 1. basic summary (most common) is complete and correct.
  anti_patterns: []
  prompts: []
- name: 2__common_folder_exclusions
  description: 'Adjust based on the project type:


    ```bash

    # Python projects

    --folders-to-skip=".git,venv,.venv,__pycache__,.cache,dist,build,.tox,.eggs,.mypy_cache"


    # JavaScript/TypeScript projects

    --folders-to-skip=".git,node_modules,dist,build,.next,.cache,.turbo,coverage"


    # General catch-all

    --folders-to-skip=".git,node_modules,venv,.venv,__pycache__,.cache,dist,build,.next,.tox,vendor,third_party"

    ```'
  checkpoint: Verify 2. common folder exclusions is complete and correct.
  anti_patterns: []
  prompts: []
- name: 3__filter_by_specific_language
  description: '```bash

    # Only count Python files

    pygount --suffix=py --format=summary .


    # Only count Python and YAML

    pygount --suffix=py,yaml,yml --format=summary .

    ```'
  checkpoint: Verify 3. filter by specific language is complete and correct.
  anti_patterns: []
  prompts: []
- name: 4__detailed_file_by_file_output
  description: '```bash

    # Default format shows per-file breakdown

    pygount --folders-to-skip=".git,node_modules,venv" .


    # Sort by code lines (pipe through sort)

    pygount --folders-to-skip=".git,node_modules,venv" . | sort -t$''\t'' -k1 -nr
    | head -20

    ```'
  checkpoint: Verify 4. detailed file-by-file output is complete and correct.
  anti_patterns: []
  prompts: []
- name: 5__output_formats
  description: '```bash

    # Summary table (default recommendation)

    pygount --format=summary .


    # JSON output for programmatic use

    pygount --format=json .


    # Pipe-friendly: Language, file count, code, docs, empty, string

    pygount --format=summary . 2>/dev/null

    ```'
  checkpoint: Verify 5. output formats is complete and correct.
  anti_patterns: []
  prompts: []
- name: 6__interpreting_results
  description: 'The summary table columns:

    - **Language** — detected programming language

    - **Files** — number of files of that language

    - **Code** — lines of actual code (executable/declarative)

    - **Comment** — lines that are comments or documentation

    - **%** — percentage of total


    Special pseudo-languages:

    - `__empty__` — empty files

    - `__binary__` — binary files (images, compiled, etc.)

    - `__generated__` — auto-generated files (detected heuristically)

    - `__duplicate__` — files with identical content

    - `__unknown__` — unrecognized file types'
  checkpoint: Verify 6. interpreting results is complete and correct.
  anti_patterns: []
  prompts: []
escalation_rules:
- If stuck after 2 attempts, ask the user for guidance
