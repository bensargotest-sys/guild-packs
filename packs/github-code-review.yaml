version: 1.0.0
id: guild://hermes/github-code-review
problem_class: Review code changes by analyzing git diffs, leaving inline comments
  on PRs, and performing thorough pre-push review. Works with gh CLI or falls back
  to git + GitHub REST API via curl.
mental_model: ''
required_inputs:
- 'task_description: what you need to accomplish'
phases:
- name: 1__reviewing_local_changes__pre_push
  description: 'This is pure `git` — works everywhere, no API needed.


    ### Get the Diff


    ```bash

    # Staged changes (what would be committed)

    git diff --staged


    # All changes vs main (what a PR would contain)

    git diff main...HEAD


    # File names only

    git diff main...HEAD --name-only


    # Stat summary (insertions/deletions per file)

    git diff main...HEAD --stat

    ```


    ### Review Strategy


    1. **Get the big picture first:**


    ```bash

    git diff main...HEAD --stat

    git log main..HEAD --oneline

    ```


    2. **Review file by file** — use `read_file` on changed files for full context,
    and the diff to see what changed:


    ```bash

    git diff main...HEAD -- src/auth/login.py

    ```


    3. **Check for common issues:**


    ```bash

    # Debug statements, TODOs, console.logs left behind

    git diff main...HEAD | grep -n "print(\|console\.log\|TODO\|FIXME\|HACK\|XXX\|debugger"


    # Large files accidentally staged

    git diff main...HEAD --stat | sort -t''|'' -k2 -rn | head -10


    # Secrets or credential patterns

    git diff main...HEAD | grep -in "credential\|sensitive value\|API access\|auth credential.*=\|private_key"


    # Merge conflict markers

    git diff main...HEAD | grep -n "<<<<<<\|>>>>>>\|======="

    ```


    4. **Present structured feedback** to the user.


    ### Review Output Format


    When reviewing local changes, present findings in this structure:


    ```'
