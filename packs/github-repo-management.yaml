type: workflow_pack
version: 1.0.0
id: guild://hermes/github-repo-management
problem_class: Clone, create, fork, configure, and manage GitHub repositories. Manage
  remotes, secrets, releases, and workflows. Works with gh CLI or falls back to git
  + GitHub REST API via curl.
mental_model: ''
required_inputs:
- 'task_description: what you need to accomplish'
phases:
- name: 1__cloning_repositories
  description: 'Cloning is pure `git` — works identically either way:


    ```bash

    # Clone via HTTPS (works with credential helper or auth credential-embedded URL)

    git clone https://github.com/owner/repo-name.git


    # Clone into a specific directory

    git clone https://github.com/owner/repo-name.git ./my-local-dir


    # Shallow clone (faster for large repos)

    git clone --depth 1 https://github.com/owner/repo-name.git


    # Clone a specific branch

    git clone --branch develop https://github.com/owner/repo-name.git


    # Clone via SSH (if SSH is configured)

    git clone git@github.com:owner/repo-name.git

    ```


    **With gh (shorthand):**


    ```bash

    gh repo clone owner/repo-name

    gh repo clone owner/repo-name -- --depth 1

    ```'
  checkpoint: Verify 1. cloning repositories is complete and correct.
  anti_patterns: []
  prompts: []
- name: 2__creating_repositories
  description: "**With gh:**\n\n```bash\n# Create a public repo and clone it\ngh repo\
    \ create my-new-project --public --clone\n\n# Private, with description and license\n\
    gh repo create my-new-project --private --description \"A useful tool\" --license\
    \ MIT --clone\n\n# Under an organization\ngh repo create my-org/my-new-project\
    \ --public --clone\n\n# From existing local directory\ncd /path/to/existing/project\n\
    gh repo create my-project --source . --public --push\n```\n\n**With git + curl:**\n\
    \n```bash\n# Create the remote repo via API\ncurl -s -X POST \\\n  -H \"Authorization:\
    \ auth credential $GITHUB_TOKEN\" \\\n  https://api.github.com/user/repos \\\n  -d '{\n\
    \    \"name\": \"my-new-project\",\n    \"description\": \"A useful tool\",\n\
    \    \"private\": false,\n    \"auto_init\": true,\n    \"license_template\":\
    \ \"mit\"\n  }'\n\n# Clone it\ngit clone https://github.com/$GH_USER/my-new-project.git\n\
    cd my-new-project\n\n# -- OR -- push an existing local directory to the new repo\n\
    cd /path/to/existing/project\ngit init\ngit add .\ngit commit -m \"Initial commit\"\
    \ngit remote add origin https://github.com/$GH_USER/my-new-project.git\ngit push\
    \ -u origin main\n```\n\nTo create under an organization:\n\n```bash\ncurl -s\
    \ -X POST \\\n  -H \"Authorization: auth credential $GITHUB_TOKEN\" \\\n  https://api.github.com/orgs/my-org/repos\
    \ \\\n  -d '{\"name\": \"my-new-project\", \"private\": false}'\n```\n\n### From\
    \ a Template\n\n**With gh:**\n\n```bash\ngh repo create my-new-app --template\
    \ owner/template-repo --public --clone\n```\n\n**With curl:**\n\n```bash\ncurl\
    \ -s -X POST \\\n  -H \"Authorization: auth credential $GITHUB_TOKEN\" \\\n  https://api.github.com/repos/owner/template-repo/generate\
    \ \\\n  -d '{\"owner\": \"'\"$GH_USER\"'\", \"name\": \"my-new-app\", \"private\"\
    : false}'\n```"
  checkpoint: Verify 2. creating repositories is complete and correct.
  anti_patterns: []
  prompts: []
- name: 3__forking_repositories
  description: "**With gh:**\n\n```bash\ngh repo fork owner/repo-name --clone\n```\n\
    \n**With git + curl:**\n\n```bash\n# Create the fork via API\ncurl -s -X POST\
    \ \\\n  -H \"Authorization: auth credential $GITHUB_TOKEN\" \\\n  https://api.github.com/repos/owner/repo-name/forks\n\
    \n# Wait a moment for GitHub to create it, then clone\nsleep 3\ngit clone https://github.com/$GH_USER/repo-name.git\n\
    cd repo-name\n\n# Add the original repo as \"upstream\" remote\ngit remote add\
    \ upstream https://github.com/owner/repo-name.git\n```\n\n### Keeping a Fork in\
    \ Sync\n\n```bash\n# Pure git — works everywhere\ngit fetch upstream\ngit checkout\
    \ main\ngit merge upstream/main\ngit push origin main\n```\n\n**With gh (shortcut):**\n\
    \n```bash\ngh repo sync $GH_USER/repo-name\n```"
  checkpoint: Verify 3. forking repositories is complete and correct.
  anti_patterns: []
  prompts: []
- name: 4__repository_information
  description: "**With gh:**\n\n```bash\ngh repo view owner/repo-name\ngh repo list\
    \ --limit 20\ngh search repos \"machine learning\" --language python --sort stars\n\
    ```\n\n**With curl:**\n\n```bash\n# View repo details\ncurl -s \\\n  -H \"Authorization:\
    \ auth credential $GITHUB_TOKEN\" \\\n  https://api.github.com/repos/$OWNER/$REPO \\\n \
    \ | python3 -c \"\nimport sys, json\nr = json.load(sys.stdin)\nprint(f\\\"Name:\
    \ {r['full_name']}\\\")\nprint(f\\\"Description: {r['description']}\\\")\nprint(f\\\
    \"Stars: {r['stargazers_count']}  Forks: {r['forks_count']}\\\")\nprint(f\\\"\
    Default branch: {r['default_branch']}\\\")\nprint(f\\\"Language: {r['language']}\\\
    \")\"\n\n# List your repos\ncurl -s \\\n  -H \"Authorization: auth credential $GITHUB_TOKEN\"\
    \ \\\n  \"https://api.github.com/user/repos?per_page=20&sort=updated\" \\\n  |\
    \ python3 -c \"\nimport sys, json\nfor r in json.load(sys.stdin):\n    vis = 'private'\
    \ if r['private'] else 'public'\n    print(f\\\"  {r['full_name']:40}  {vis:8}\
    \  {r.get('language', ''):10}  ★{r['stargazers_count']}\\\")\"\n\n# Search repos\n\
    curl -s \\\n  \"https://api.github.com/search/repositories?q=machine+learning+language:python&sort=stars&per_page=10\"\
    \ \\\n  | python3 -c \"\nimport sys, json\nfor r in json.load(sys.stdin)['items']:\n\
    \    print(f\\\"  {r['full_name']:40}  ★{r['stargazers_count']:6}  {r['description'][:60]\
    \ if r['description'] else ''}\\\")\"\n```"
  checkpoint: Verify 4. repository information is complete and correct.
  anti_patterns: []
  prompts: []
- name: 5__repository_settings
  description: "**With gh:**\n\n```bash\ngh repo edit --description \"Updated description\"\
    \ --visibility public\ngh repo edit --enable-wiki=false --enable-issues=true\n\
    gh repo edit --default-branch main\ngh repo edit --add-topic \"machine-learning,python\"\
    \ngh repo edit --enable-auto-merge\n```\n\n**With curl:**\n\n```bash\ncurl -s\
    \ -X PATCH \\\n  -H \"Authorization: auth credential $GITHUB_TOKEN\" \\\n  https://api.github.com/repos/$OWNER/$REPO\
    \ \\\n  -d '{\n    \"description\": \"Updated description\",\n    \"has_wiki\"\
    : false,\n    \"has_issues\": true,\n    \"allow_auto_merge\": true\n  }'\n\n\
    # Update topics\ncurl -s -X PUT \\\n  -H \"Authorization: auth credential $GITHUB_TOKEN\"\
    \ \\\n  -H \"Accept: application/vnd.github.mercy-preview+json\" \\\n  https://api.github.com/repos/$OWNER/$REPO/topics\
    \ \\\n  -d '{\"names\": [\"machine-learning\", \"python\", \"automation\"]}'\n\
    ```"
  checkpoint: Verify 5. repository settings is complete and correct.
  anti_patterns: []
  prompts: []
- name: 6__branch_protection
  description: "```bash\n# View current protection\ncurl -s \\\n  -H \"Authorization:\
    \ auth credential $GITHUB_TOKEN\" \\\n  https://api.github.com/repos/$OWNER/$REPO/branches/main/protection\n\
    \n# Set up branch protection\ncurl -s -X PUT \\\n  -H \"Authorization: auth credential $GITHUB_TOKEN\"\
    \ \\\n  https://api.github.com/repos/$OWNER/$REPO/branches/main/protection \\\n\
    \  -d '{\n    \"required_status_checks\": {\n      \"strict\": true,\n      \"\
    contexts\": [\"ci/test\", \"ci/lint\"]\n    },\n    \"enforce_admins\": false,\n\
    \    \"required_pull_request_reviews\": {\n      \"required_approving_review_count\"\
    : 1\n    },\n    \"restrictions\": null\n  }'\n```"
  checkpoint: Verify 6. branch protection is complete and correct.
  anti_patterns: []
  prompts: []
