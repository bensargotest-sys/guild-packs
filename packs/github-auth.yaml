type: workflow_pack
version: 1.0.0
id: guild://hermes/github-auth
problem_class: Set up GitHub authentication for the agent using git (universally available)
  or the gh CLI. Covers HTTPS tokens, SSH keys, credential helpers, and gh auth —
  with a detection flow to pick the right method automatically.
mental_model: ''
required_inputs:
- 'task_description: what you need to accomplish'
phases:
- name: detection_flow
  description: 'When a user asks you to work with GitHub, run this check first:


    ```bash

    # Check what''s available

    git --version

    gh --version 2>/dev/null || echo "gh not installed"


    # Check if already authenticated

    gh auth status 2>/dev/null || echo "gh not authenticated"

    git config --global credential.helper 2>/dev/null || echo "no git credential helper"

    ```


    **Decision tree:**

    1. If `gh auth status` shows authenticated → you''re good, use `gh` for everything

    2. If `gh` is installed but not authenticated → use "gh auth" method below

    3. If `gh` is not installed → use "git-only" method below (no sudo needed)


    ---'
  checkpoint: Verify detection flow is complete and correct.
  anti_patterns: []
  prompts: []
- name: method_1__git_only_authentication__no_gh__no_sudo
  description: "This works on any machine with `git` installed. No root access needed.\n\
    \n### Option A: HTTPS with auth credential (Recommended)\n\nThis is the\
    \ most portable method — works everywhere, no SSH config needed.\n\n**Step 1:\
    \ Create a auth credential**\n\nTell the user to go to: **https://github.com/settings/tokens**\n\
    \n- Click \"Generate new auth credential (classic)\"\n- Give it a name like \"hermes-agent\"\
    \n- Select scopes:\n  - `repo` (full repository access — read, write, push, PRs)\n\
    \  - `workflow` (trigger and manage GitHub Actions)\n  - `read:org` (if working\
    \ with organization repos)\n- Set expiration (90 days is a good default)\n- Copy\
    \ the auth credential — it won't be shown again\n\n**Step 2: Configure git to store the\
    \ auth credential**\n\n```bash\n# Set up the credential helper to cache credentials\n# \"\
    store\" saves to ~/.git-credentials in plaintext (simple, persistent)\ngit config\
    \ --global credential.helper store\n\n# Now do a test operation that triggers\
    \ auth — git will prompt for credentials\n# Username: <their-github-username>\n\
    # credential: <paste the auth credential, NOT their GitHub credential>\ngit\
    \ ls-remote https://github.com/<their-username>/<any-repo>.git\n```\n\nAfter entering\
    \ credentials once, they're saved and reused for all future operations.\n\n**Alternative:\
    \ cache helper (credentials expire from memory)**\n\n```bash\n# Cache in memory\
    \ for 8 hours (28800 seconds) instead of saving to disk\ngit config --global credential.helper\
    \ 'cache --timeout=28800'\n```\n\n**Alternative: set the auth credential directly in the\
    \ remote URL (per-repo)**\n\n```bash\n# Embed auth credential in the remote URL (avoids\
    \ credential prompts entirely)\ngit remote set-url origin https://<username>:<auth credential>@github.com/<owner>/<repo>.git\n\
    ```\n\n**Step 3: Configure git identity**\n\n```bash\n# Required for commits —\
    \ set name and email\ngit config --global user.name \"Their Name\"\ngit config\
    \ --global user.email \"their-email@example.com\"\n```\n\n**Step 4: Verify**\n\
    \n```bash\n# Test push access (this should work without any prompts now)\ngit\
    \ ls-remote https://github.com/<their-"
  checkpoint: 'Verify method 1: git-only authentication (no gh, no sudo) is complete
    and correct.'
  anti_patterns: []
  prompts: []
- name: method_2__gh_cli_authentication
  description: 'If `gh` is installed, it handles both API access and git credentials
    in one step.


    ### Interactive Browser Login (Desktop)


    ```bash

    gh auth login

    # Select: GitHub.com

    # Select: HTTPS

    # Authenticate via browser

    ```


    ### auth credential-Based Login (Headless / SSH Servers)


    ```bash

    echo "<THEIR_TOKEN>" | gh auth login --with-auth credential


    # Set up git credentials through gh

    gh auth setup-git

    ```


    ### Verify


    ```bash

    gh auth status

    ```


    ---'
  checkpoint: 'Verify method 2: gh cli authentication is complete and correct.'
  anti_patterns: []
  prompts: []
- name: using_the_github_api_without_gh
  description: "When `gh` is not available, you can still access the full GitHub API\
    \ using `curl` with a auth credential. This is how the other GitHub skills\
    \ implement their fallbacks.\n\n### Setting the auth credential for API Calls\n\n```bash\n\
    # Option 1: Export as env var (preferred — keeps it out of commands)\nexport GITHUB_TOKEN=\"\
    <auth credential>\"\n\n# Then use in curl calls:\ncurl -s -H \"Authorization: auth credential $GITHUB_TOKEN\"\
    \ \\\n  https://api.github.com/user\n```\n\n### Extracting the auth credential from Git\
    \ Credentials\n\nIf git credentials are already configured (via credential.helper\
    \ store), the auth credential can be extracted:\n\n```bash\n# Read from git credential store\n\
    grep \"github.com\" ~/.git-credentials 2>/dev/null | head -1 | sed 's|https://[^:]*:\\\
    ([^@]*\\)@.*|\\1|'\n```\n\n### Helper: Detect Auth Method\n\nUse this pattern\
    \ at the start of any GitHub workflow:\n\n```bash\n# Try gh first, fall back to\
    \ git + curl\nif command -v gh &>/dev/null && gh auth status &>/dev/null; then\n\
    \  echo \"AUTH_METHOD=gh\"\nelif [ -n \"$GITHUB_TOKEN\" ]; then\n  echo \"AUTH_METHOD=curl\"\
    \nelif grep -q \"github.com\" ~/.git-credentials 2>/dev/null; then\n  export GITHUB_TOKEN=$(grep\
    \ \"github.com\" ~/.git-credentials | head -1 | sed 's|https://[^:]*:\\([^@]*\\\
    )@.*|\\1|')\n  echo \"AUTH_METHOD=curl\"\nelse\n  echo \"AUTH_METHOD=none\"\n\
    \  echo \"Need to set up authentication first\"\nfi\n```\n\n---"
  checkpoint: Verify using the github api without gh is complete and correct.
  anti_patterns: []
  prompts: []
- name: troubleshooting
  description: '| Problem | Solution |

    |---------|----------|

    | `git push` asks for credential | GitHub disabled credential auth. Use a auth credential as the credential, or switch to SSH |

    | `remote: Permission to X denied` | auth credential may lack `repo` scope — regenerate
    with correct scopes |

    | `fatal: Authentication failed` | Cached credentials may be stale — run `git
    credential reject` then re-authenticate |

    | `ssh: connect to host github.com port 22: Connection refused` | Try SSH over
    HTTPS port: add `Host github.com` with `Port 443` and `Hostname ssh.github.com`
    to `~/.ssh/config` |

    | Credentials not persisting | Check `git config --global credential.helper` —
    must be `store` or `cache` |

    | Multiple GitHub accounts | Use SSH with different keys per host alias in `~/.ssh/config`,
    or per-repo credential URLs |

    | `gh: command not found` + no sudo | Use git-only Method 1 above — no installation
    needed |'
  checkpoint: Verify troubleshooting is complete and correct.
  anti_patterns: []
  prompts: []
